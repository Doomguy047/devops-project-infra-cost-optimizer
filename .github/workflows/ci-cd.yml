name: CI Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Run application test
        run: |
          cd src/main
          python app.py

      - name: Build Docker image
        run: |
          docker build -t infra-cost-optimizer -f infrastructure/docker/Dockerfile .
